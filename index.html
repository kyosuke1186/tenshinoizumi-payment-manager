<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>月別支払い管理</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --line: #dde2e8;
      --text: #1d2430;
      --muted: #667085;
      --ad: #0f766e;
      --fixed: #b45309;
      --primary: #315c72;
      --primary-dark: #234455;
      --danger: #b42318;
      --paid: #147d45;
      --unpaid: #875bf7;
      --shadow: 0 12px 32px rgba(29, 36, 48, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 0 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      line-height: 1.2;
      font-weight: 800;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .month-control {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-btn,
    .text-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      min-height: 42px;
      transition: .16s ease;
    }

    .icon-btn {
      width: 42px;
      display: inline-grid;
      place-items: center;
      font-size: 1.05rem;
    }

    .text-btn {
      padding: 0 14px;
      font-weight: 700;
    }

    .icon-btn:hover,
    .text-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .month-input {
      width: 150px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: var(--surface);
      color: var(--text);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 22px 0;
    }

    .summary-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 4px 18px rgba(29, 36, 48, .04);
    }

    .summary-label {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: clamp(1.15rem, 2.6vw, 1.75rem);
      font-weight: 850;
      line-height: 1.15;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .ad {
      color: var(--ad);
    }

    .fixed {
      color: var(--fixed);
    }

    .selected {
      color: var(--primary);
    }

    .carry {
      color: var(--unpaid);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 11px;
      height: 36px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .mark.ad-mark {
      background: var(--ad);
    }

    .mark.fixed-mark {
      background: var(--fixed);
    }

    .section-title h2 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .section-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .85rem;
    }

    .add-btn {
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      padding: 0 13px;
      color: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    .add-btn.ad-bg {
      background: var(--ad);
    }

    .add-btn.fixed-bg {
      background: var(--fixed);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: .9rem;
    }

    th {
      color: var(--muted);
      font-size: .76rem;
      background: #fff;
      font-weight: 800;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .col-date {
      width: 142px;
    }

    .col-amount {
      width: 126px;
      text-align: right;
    }

    .col-status {
      width: 88px;
    }

    .col-actions {
      width: 154px;
      text-align: right;
    }

    .item-name {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .item-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: .78rem;
      overflow-wrap: anywhere;
    }

    .amount {
      font-weight: 850;
      white-space: nowrap;
    }

    .status {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: .76rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .status.paid {
      color: var(--paid);
      border-color: rgba(20, 125, 69, .24);
      background: rgba(20, 125, 69, .08);
    }

    .status.unpaid {
      color: var(--unpaid);
      border-color: rgba(135, 91, 247, .24);
      background: rgba(135, 91, 247, .08);
    }

    .status.excluded {
      color: var(--muted);
      border-color: rgba(102, 112, 133, .24);
      background: rgba(102, 112, 133, .08);
    }

    .status.carryover {
      color: var(--unpaid);
      border-color: rgba(135, 91, 247, .24);
      background: rgba(135, 91, 247, .08);
    }

    .cell-input {
      min-height: 36px;
      padding: 7px 9px;
      border-radius: 7px;
      font-size: .86rem;
      background: #fff;
    }

    .cell-input:disabled {
      color: var(--muted);
      background: #f2f4f7;
      cursor: not-allowed;
    }

    .amount-input {
      text-align: right;
    }

    .mini-actions {
      display: inline-flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .mini-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      display: inline-grid;
      place-items: center;
    }

    .mini-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .mini-btn.delete:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .empty {
      padding: 28px 16px;
      color: var(--muted);
      text-align: center;
      font-size: .92rem;
    }

    .footer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      color: var(--muted);
      font-size: .86rem;
      flex-wrap: wrap;
    }

    .danger-link {
      border: 0;
      color: var(--danger);
      background: transparent;
      font-weight: 800;
      padding: 8px 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(16, 24, 40, .46);
      z-index: 20;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(16, 24, 40, .25);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 1.08rem;
    }

    .modal-body {
      padding: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 42px;
      padding: 9px 11px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(49, 92, 114, .14);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 20px 20px;
    }

    .settings-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.6;
    }

    .primary-btn,
    .ghost-btn {
      min-height: 42px;
      border-radius: 8px;
      padding: 0 16px;
      font-weight: 850;
    }

    .primary-btn {
      border: 0;
      background: var(--primary);
      color: #fff;
    }

    .primary-btn:hover {
      background: var(--primary-dark);
    }

    .ghost-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .close-btn {
      border: 0;
      background: transparent;
      font-size: 1.45rem;
      line-height: 1;
      width: 34px;
      height: 34px;
      border-radius: 8px;
    }

    .close-btn:hover {
      background: var(--surface-soft);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translate(-50%, 80px);
      background: #1d2430;
      color: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: 800;
      opacity: 0;
      transition: .22s ease;
      z-index: 30;
      max-width: calc(100% - 32px);
      text-align: center;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    @media (max-width: 900px) {
      .summary,
      .workspace {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .month-control {
        width: 100%;
        justify-content: flex-start;
      }

      .month-input {
        flex: 1 1 140px;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .add-btn {
        width: 100%;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .modal-actions {
        flex-direction: column-reverse;
      }

      .primary-btn,
      .ghost-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>月別支払い管理</h1>
        <p>支払い先をマスター管理し、月ごとの日程・場所・金額を確定していきます。</p>
      </div>

      <div class="month-control" aria-label="表示月の切り替え">
        <button class="icon-btn" id="prevMonth" type="button" title="前月">‹</button>
        <input class="month-input" id="monthPicker" type="month" aria-label="表示月">
        <button class="icon-btn" id="nextMonth" type="button" title="翌月">›</button>
        <button class="text-btn" id="thisMonth" type="button">今月</button>
        <button class="text-btn" id="openSettings" type="button">設定</button>
      </div>
    </header>

    <section class="summary" aria-label="月別集計">
      <div class="summary-item">
        <div class="summary-label">確定分合計</div>
        <div class="summary-value" id="totalAmount">0円</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">広告費 確定分</div>
        <div class="summary-value ad" id="adAmount">0円</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">固定費 確定分</div>
        <div class="summary-value fixed" id="fixedAmount">0円</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">来月持ち越し</div>
        <div class="summary-value carry" id="carryoverAmount">0円</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">未確定</div>
        <div class="summary-value selected" id="selectedAmount">0円</div>
      </div>
    </section>

    <section class="workspace" aria-label="支払い一覧">
      <article class="section">
        <div class="section-head">
          <div class="section-title">
            <span class="mark ad-mark" aria-hidden="true"></span>
            <div>
              <h2>広告費</h2>
              <p><span id="adCount">0</span>件 / <span id="adSectionTotal">0円</span></p>
            </div>
          </div>
          <button class="add-btn ad-bg" type="button" data-add="広告費">＋ 項目追加</button>
        </div>
        <div class="table-wrap" id="adTable"></div>
      </article>

      <article class="section">
        <div class="section-head">
          <div class="section-title">
            <span class="mark fixed-mark" aria-hidden="true"></span>
            <div>
              <h2>固定費</h2>
              <p><span id="fixedCount">0</span>件 / <span id="fixedSectionTotal">0円</span></p>
            </div>
          </div>
          <button class="add-btn fixed-bg" type="button" data-add="固定費">＋ 項目追加</button>
        </div>
        <div class="table-wrap" id="fixedTable"></div>
      </article>
    </section>

    <div class="footer-actions">
      <span id="syncStatus">このブラウザに自動保存されます。</span>
      <button class="danger-link" id="clearMonth" type="button">表示月の入力をクリア</button>
    </div>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <form class="modal" id="paymentForm">
      <div class="modal-head">
        <h3 id="modalTitle">項目を追加</h3>
        <button class="close-btn" id="closeModal" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="paymentId">
        <div class="form-grid">
          <div class="field">
            <label for="paymentCategory">カテゴリ</label>
            <select id="paymentCategory" required>
              <option value="広告費">広告費</option>
              <option value="固定費">固定費</option>
            </select>
          </div>
          <div class="field full">
            <label for="paymentName">支払い先・項目名</label>
            <input id="paymentName" type="text" placeholder="例：Google広告、A先生、サーバー代" required>
          </div>
          <div class="field full">
            <label for="paymentMemo">メモ</label>
            <textarea id="paymentMemo" placeholder="任意でマスター用メモを入力"></textarea>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="ghost-btn" id="cancelModal" type="button">キャンセル</button>
        <button class="primary-btn" type="submit">保存</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="settingsBackdrop" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <form class="modal" id="settingsForm">
      <div class="modal-head">
        <h3 id="settingsTitle">保存先設定</h3>
        <button class="close-btn" id="closeSettings" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="modal-body">
        <div class="field">
          <label for="scriptUrl">Apps Script WebアプリURL</label>
          <input id="scriptUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
        <div class="field">
          <label for="syncToken">同期トークン</label>
          <input id="syncToken" type="password" placeholder="Apps ScriptのAPI_TOKEN">
        </div>
        <p class="settings-note">URLを保存すると、支払いデータをGoogleスプレッドシートへ同期します。未設定でも、このブラウザ内には保存されます。</p>
      </div>

      <div class="modal-actions">
        <button class="ghost-btn" id="syncNow" type="button">今すぐ同期</button>
        <button class="primary-btn" type="submit">設定を保存</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "tenshinoizumi-payment-manager-v2";
    const LEGACY_STORAGE_KEY = "tenshinoizumi-payment-manager-v1";
    const CONFIG_KEY = "tenshinoizumi-payment-manager-config-v1";
    const categories = ["広告費", "固定費"];

    const state = {
      masters: [],
      entries: [],
      currentMonth: toMonthValue(new Date()),
      config: {
        scriptUrl: "",
        token: ""
      },
      isSyncing: false
    };

    const el = {
      monthPicker: document.getElementById("monthPicker"),
      totalAmount: document.getElementById("totalAmount"),
      adAmount: document.getElementById("adAmount"),
      fixedAmount: document.getElementById("fixedAmount"),
      carryoverAmount: document.getElementById("carryoverAmount"),
      selectedAmount: document.getElementById("selectedAmount"),
      adSectionTotal: document.getElementById("adSectionTotal"),
      fixedSectionTotal: document.getElementById("fixedSectionTotal"),
      adCount: document.getElementById("adCount"),
      fixedCount: document.getElementById("fixedCount"),
      adTable: document.getElementById("adTable"),
      fixedTable: document.getElementById("fixedTable"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      modalTitle: document.getElementById("modalTitle"),
      form: document.getElementById("paymentForm"),
      paymentId: document.getElementById("paymentId"),
      paymentCategory: document.getElementById("paymentCategory"),
      paymentName: document.getElementById("paymentName"),
      paymentMemo: document.getElementById("paymentMemo"),
      syncStatus: document.getElementById("syncStatus"),
      settingsBackdrop: document.getElementById("settingsBackdrop"),
      settingsForm: document.getElementById("settingsForm"),
      scriptUrl: document.getElementById("scriptUrl"),
      syncToken: document.getElementById("syncToken"),
      toast: document.getElementById("toast")
    };

    function toMonthValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${year}-${month}`;
    }

    function formatYen(value) {
      return `${Number(value || 0).toLocaleString("ja-JP")}円`;
    }

    function loadPayments() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (saved && Array.isArray(saved.masters) && Array.isArray(saved.entries)) {
          state.masters = saved.masters.map(normalizeMaster).filter(Boolean);
          state.entries = saved.entries.map(normalizeEntry).filter(Boolean);
        } else {
          migrateLegacyPayments();
        }
      } catch {
        migrateLegacyPayments();
      }

      try {
        const savedConfig = JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}");
        state.config.scriptUrl = typeof savedConfig.scriptUrl === "string" ? savedConfig.scriptUrl : "";
        state.config.token = typeof savedConfig.token === "string" ? savedConfig.token : "";
      } catch {
        state.config.scriptUrl = "";
        state.config.token = "";
      }
    }

    function savePayments() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        masters: state.masters,
        entries: state.entries
      }));
      syncToSheet();
    }

    function saveConfig() {
      localStorage.setItem(CONFIG_KEY, JSON.stringify(state.config));
    }

    function currentMonthRows() {
      return state.masters
        .filter(master => master.active !== false)
        .map(master => ({
          master,
          entry: getEntry(master.id, state.currentMonth)
        }))
        .sort((a, b) => {
          const categoryOrder = categories.indexOf(a.master.category) - categories.indexOf(b.master.category);
          if (categoryOrder !== 0) return categoryOrder;
          return a.master.name.localeCompare(b.master.name, "ja");
        });
    }

    function confirmedRows(rows) {
      return rows.filter(row => getRowStatus(row) === "確定");
    }

    function sumRows(rows) {
      return rows.reduce((total, row) => total + Number(row.entry.amount || 0), 0);
    }

    function render() {
      el.monthPicker.value = state.currentMonth;

      const rows = currentMonthRows();
      const adRows = rows.filter(row => row.master.category === "広告費");
      const fixedRows = rows.filter(row => row.master.category === "固定費");
      const confirmed = confirmedRows(rows);
      const confirmedAd = confirmedRows(adRows);
      const confirmedFixed = confirmedRows(fixedRows);
      const carryoverRows = rows.filter(row => getRowStatus(row) === "持ち越し");
      const pendingCount = rows.filter(row => getRowStatus(row) === "未確定").length;
      const excludedCount = rows.filter(row => getRowStatus(row) === "対象外").length;

      el.totalAmount.textContent = formatYen(sumRows(confirmed));
      el.adAmount.textContent = formatYen(sumRows(confirmedAd));
      el.fixedAmount.textContent = formatYen(sumRows(confirmedFixed));
      el.carryoverAmount.textContent = formatYen(sumRows(carryoverRows));
      el.selectedAmount.textContent = `${pendingCount}件`;
      el.adSectionTotal.textContent = `${formatYen(sumRows(confirmedAd))} / 持越${formatYen(sumRows(adRows.filter(row => getRowStatus(row) === "持ち越し")))}`;
      el.fixedSectionTotal.textContent = `${formatYen(sumRows(confirmedFixed))} / 持越${formatYen(sumRows(fixedRows.filter(row => getRowStatus(row) === "持ち越し")))}`;
      el.adCount.textContent = adRows.length;
      el.fixedCount.textContent = fixedRows.length;

      renderTable(el.adTable, adRows, "広告費");
      renderTable(el.fixedTable, fixedRows, "固定費");
      updateSyncStatus();
    }

    function renderTable(container, rows, category) {
      if (!rows.length) {
        container.innerHTML = `<div class="empty">${category}のマスター項目はまだありません。</div>`;
        return;
      }

      const rowHtml = rows.map(row => {
        const { master, entry } = row;
        const status = getRowStatus(row);
        const statusClass = status === "確定" ? "paid" : status === "対象外" ? "excluded" : status === "持ち越し" ? "carryover" : "unpaid";
        const notes = [];
        if (master.memo) notes.push(escapeHtml(master.memo));
        if (entry.carriedFrom) notes.push(`${escapeHtml(entry.carriedFrom)}から持ち越し`);
        const memo = notes.length ? `<div class="item-note">${notes.join(" / ")}</div>` : "";
        const disabled = entry.excluded || entry.carryover ? "disabled" : "";

        return `
          <tr>
            <td>
              <div class="item-name">${escapeHtml(master.name)}</div>
              ${memo}
            </td>
            <td class="col-date">
              <input class="cell-input" type="date" data-field="date" data-master="${master.id}" value="${escapeHtml(entry.date)}" ${disabled}>
            </td>
            <td>
              <input class="cell-input" type="text" data-field="place" data-master="${master.id}" value="${escapeHtml(entry.place)}" placeholder="手渡し場所" ${disabled}>
            </td>
            <td class="col-amount">
              <input class="cell-input amount-input" type="number" min="0" step="1" inputmode="numeric" data-field="amount" data-master="${master.id}" value="${escapeHtml(entry.amount)}" placeholder="0" ${disabled}>
            </td>
            <td class="col-status">
              <span class="status ${statusClass}">${status}</span>
            </td>
            <td class="col-actions">
              <span class="mini-actions">
                <button class="mini-btn" type="button" data-exclude="${master.id}" title="今月なし">${entry.excluded ? "戻" : "休"}</button>
                <button class="mini-btn" type="button" data-carryover="${master.id}" title="来月持ち越し">${entry.carryover ? "戻" : "翌"}</button>
                <button class="mini-btn" type="button" data-edit="${master.id}" title="マスター編集">✎</button>
                <button class="mini-btn delete" type="button" data-delete="${master.id}" title="マスター削除">×</button>
              </span>
            </td>
          </tr>
        `;
      }).join("");

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>項目</th>
              <th class="col-date">日程</th>
              <th>場所</th>
              <th class="col-amount">金額</th>
              <th class="col-status">状態</th>
              <th class="col-actions">操作</th>
            </tr>
          </thead>
          <tbody>${rowHtml}</tbody>
        </table>
      `;
    }

    function openModal(category, id = "") {
      const master = id ? state.masters.find(item => item.id === id) : null;
      el.paymentId.value = master?.id || "";
      el.paymentCategory.value = master?.category || category || "広告費";
      el.paymentName.value = master?.name || "";
      el.paymentMemo.value = master?.memo || "";
      el.modalTitle.textContent = master ? "項目マスターを編集" : `${el.paymentCategory.value}の項目を追加`;
      el.modalBackdrop.classList.add("open");
      setTimeout(() => el.paymentName.focus(), 50);
    }

    function closeModal() {
      el.modalBackdrop.classList.remove("open");
      el.form.reset();
    }

    function handleSubmit(event) {
      event.preventDefault();

      const id = el.paymentId.value || createId();
      const master = {
        id,
        category: el.paymentCategory.value,
        name: el.paymentName.value.trim(),
        memo: el.paymentMemo.value.trim(),
        active: true
      };

      if (!categories.includes(master.category) || !master.name) {
        showToast("入力内容を確認してください");
        return;
      }

      const existingIndex = state.masters.findIndex(item => item.id === id);
      if (existingIndex >= 0) {
        state.masters[existingIndex] = master;
      } else {
        state.masters.push(master);
      }

      savePayments();
      closeModal();
      render();
      showToast("保存しました");
    }

    function handlePageClick(event) {
      const addCategory = event.target.closest("[data-add]")?.dataset.add;
      const editId = event.target.closest("[data-edit]")?.dataset.edit;
      const deleteId = event.target.closest("[data-delete]")?.dataset.delete;
      const excludeId = event.target.closest("[data-exclude]")?.dataset.exclude;
      const carryoverId = event.target.closest("[data-carryover]")?.dataset.carryover;

      if (addCategory) {
        openModal(addCategory);
      }

      if (editId) {
        openModal("", editId);
      }

      if (deleteId) {
        deleteMaster(deleteId);
      }

      if (excludeId) {
        toggleExcluded(excludeId);
      }

      if (carryoverId) {
        toggleCarryover(carryoverId);
      }
    }

    function handleSelection(event) {
      const field = event.target?.dataset?.field;
      const masterId = event.target?.dataset?.master;
      if (!field || !masterId) return;

      updateEntry(masterId, field, event.target.value);
      render();
    }

    function updateEntry(masterId, field, value) {
      const entry = ensureEntry(masterId, state.currentMonth);
      entry[field] = field === "amount" ? String(Math.max(0, Number(value || 0)) || "") : value;
      if (field !== "excluded") {
        entry.excluded = false;
        entry.carryover = false;
      }
      savePayments();
    }

    function toggleExcluded(masterId) {
      const entry = ensureEntry(masterId, state.currentMonth);
      const wasCarryover = entry.carryover;
      entry.excluded = !entry.excluded;
      if (entry.excluded) {
        entry.date = "";
        entry.place = "";
        entry.amount = "";
        entry.carryover = false;
        if (wasCarryover) removeAutoCarryoverFromNextMonth(masterId);
      }
      savePayments();
      render();
    }

    function toggleCarryover(masterId) {
      const entry = ensureEntry(masterId, state.currentMonth);
      entry.carryover = !entry.carryover;
      if (entry.carryover) {
        entry.excluded = false;
        copyCarryoverToNextMonth(masterId, entry);
      } else {
        removeAutoCarryoverFromNextMonth(masterId);
      }
      savePayments();
      render();
    }

    function deleteMaster(id) {
      const master = state.masters.find(item => item.id === id);
      if (!master) return;
      if (!confirm(`「${master.name}」をマスターから削除しますか？過去月の入力も削除されます。`)) return;

      state.masters = state.masters.filter(item => item.id !== id);
      state.entries = state.entries.filter(item => item.masterId !== id);
      savePayments();
      render();
      showToast("削除しました");
    }

    function shiftMonth(offset) {
      const [year, month] = state.currentMonth.split("-").map(Number);
      const date = new Date(year, month - 1 + offset, 1);
      state.currentMonth = toMonthValue(date);
      render();
    }

    function clearCurrentMonth() {
      const monthEntries = state.entries.filter(entry => entry.month === state.currentMonth);
      if (!monthEntries.length) {
        showToast("削除するデータがありません");
        return;
      }
      if (!confirm(`${state.currentMonth}の入力内容をクリアしますか？マスター項目は残ります。`)) return;

      state.entries = state.entries.filter(entry => entry.month !== state.currentMonth);
      savePayments();
      render();
      showToast("表示月の入力をクリアしました");
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.toast.classList.remove("show"), 1800);
    }

    function openSettings() {
      el.scriptUrl.value = state.config.scriptUrl;
      el.syncToken.value = state.config.token;
      el.settingsBackdrop.classList.add("open");
      setTimeout(() => el.scriptUrl.focus(), 50);
    }

    function closeSettings() {
      el.settingsBackdrop.classList.remove("open");
    }

    function updateSyncStatus(message = "") {
      if (message) {
        el.syncStatus.textContent = message;
        return;
      }
      el.syncStatus.textContent = state.config.scriptUrl
        ? "このブラウザとGoogleスプレッドシートに保存されます。"
        : "このブラウザに自動保存されます。";
    }

    async function loadFromSheet() {
      if (!state.config.scriptUrl) return;
      updateSyncStatus("Googleスプレッドシートから読み込み中...");
      try {
        const result = await requestSheet("list");
        const data = result.data || {};
        if (Array.isArray(data.masters) && Array.isArray(data.entries)) {
          state.masters = data.masters.map(normalizeMaster).filter(Boolean);
          state.entries = data.entries.map(normalizeEntry).filter(Boolean);
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ masters: state.masters, entries: state.entries }));
          render();
          showToast("スプレッドシートから読み込みました");
        } else if (Array.isArray(result.payments)) {
          state.masters = [];
          state.entries = [];
          result.payments.map(normalizePayment).filter(Boolean).forEach(addLegacyPayment);
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ masters: state.masters, entries: state.entries }));
          render();
          showToast("旧形式データを読み込みました");
        }
      } catch (error) {
        updateSyncStatus("スプレッドシートを読み込めませんでした。ブラウザ内のデータを表示しています。");
      }
    }

    async function syncToSheet() {
      if (!state.config.scriptUrl || state.isSyncing) {
        updateSyncStatus();
        return;
      }
      state.isSyncing = true;
      updateSyncStatus("Googleスプレッドシートへ保存中...");
      try {
        await requestSheet("replaceAll", { data: { masters: state.masters, entries: state.entries } });
        updateSyncStatus(`Googleスプレッドシートへ保存済み ${new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })}`);
      } catch (error) {
        updateSyncStatus("スプレッドシート保存に失敗しました。ブラウザ内には保存されています。");
      } finally {
        state.isSyncing = false;
      }
    }

    async function requestSheet(action, payload = {}) {
      const response = await fetch(state.config.scriptUrl, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({ action, token: state.config.token, ...payload })
      });
      const result = await response.json();
      if (!result.ok) {
        throw new Error(result.error || "Sheet request failed");
      }
      return result;
    }

    function normalizeMaster(master) {
      if (!master || !master.id || !master.name) return null;
      return {
        id: String(master.id),
        category: categories.includes(master.category) ? master.category : "固定費",
        name: String(master.name),
        memo: String(master.memo || ""),
        active: master.active !== false
      };
    }

    function normalizeEntry(entry) {
      if (!entry || !entry.masterId || !entry.month) return null;
      return {
        masterId: String(entry.masterId),
        month: String(entry.month),
        date: String(entry.date || ""),
        place: String(entry.place || ""),
        amount: entry.amount === 0 ? "0" : String(entry.amount || ""),
        excluded: Boolean(entry.excluded),
        carryover: Boolean(entry.carryover),
        carriedFrom: String(entry.carriedFrom || "")
      };
    }

    function normalizePayment(payment) {
      if (!payment || !payment.id || !payment.date || !payment.name) return null;
      return {
        id: String(payment.id),
        category: categories.includes(payment.category) ? payment.category : "固定費",
        date: String(payment.date),
        name: String(payment.name),
        amount: Number(payment.amount || 0),
        status: payment.status === "支払い済み" ? "支払い済み" : "未払い",
        memo: String(payment.memo || "")
      };
    }

    function migrateLegacyPayments() {
      state.masters = [];
      state.entries = [];
      try {
        const legacy = JSON.parse(localStorage.getItem(LEGACY_STORAGE_KEY) || "[]");
        if (Array.isArray(legacy)) {
          legacy.map(normalizePayment).filter(Boolean).forEach(addLegacyPayment);
        }
      } catch {
        state.masters = [];
        state.entries = [];
      }
    }

    function addLegacyPayment(payment) {
      const existing = state.masters.find(master => master.category === payment.category && master.name === payment.name);
      const master = existing || {
        id: createId(),
        category: payment.category,
        name: payment.name,
        memo: payment.memo,
        active: true
      };
      if (!existing) state.masters.push(master);
      state.entries.push({
        masterId: master.id,
        month: payment.date.slice(0, 7),
        date: payment.date,
        place: "",
        amount: String(payment.amount || ""),
        excluded: false,
        carryover: false,
        carriedFrom: ""
      });
    }

    function getEntry(masterId, month) {
      return state.entries.find(entry => entry.masterId === masterId && entry.month === month) || {
        masterId,
        month,
        date: "",
        place: "",
        amount: "",
        excluded: false,
        carryover: false,
        carriedFrom: ""
      };
    }

    function ensureEntry(masterId, month) {
      let entry = state.entries.find(item => item.masterId === masterId && item.month === month);
      if (!entry) {
        entry = { masterId, month, date: "", place: "", amount: "", excluded: false, carryover: false, carriedFrom: "" };
        state.entries.push(entry);
      }
      return entry;
    }

    function getRowStatus(row) {
      if (row.entry.excluded) return "対象外";
      if (row.entry.carryover) return "持ち越し";
      if (row.entry.date && row.entry.place.trim() && row.entry.amount !== "") return "確定";
      return "未確定";
    }

    function nextMonthValue(monthValue) {
      const [year, month] = monthValue.split("-").map(Number);
      return toMonthValue(new Date(year, month, 1));
    }

    function copyCarryoverToNextMonth(masterId, sourceEntry) {
      const nextMonth = nextMonthValue(state.currentMonth);
      const nextEntry = ensureEntry(masterId, nextMonth);
      if (!nextEntry.date && !nextEntry.place && nextEntry.amount === "") {
        nextEntry.amount = sourceEntry.amount || "";
        nextEntry.carriedFrom = state.currentMonth;
        nextEntry.excluded = false;
        nextEntry.carryover = false;
      }
    }

    function removeAutoCarryoverFromNextMonth(masterId) {
      const nextMonth = nextMonthValue(state.currentMonth);
      state.entries = state.entries.filter(entry => {
        const isAutoCarryover = entry.masterId === masterId
          && entry.month === nextMonth
          && entry.carriedFrom === state.currentMonth
          && !entry.date
          && !entry.place
          && !entry.carryover
          && !entry.excluded;
        return !isAutoCarryover;
      });
    }

    function createId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `payment-${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("prevMonth").addEventListener("click", () => shiftMonth(-1));
    document.getElementById("nextMonth").addEventListener("click", () => shiftMonth(1));
    document.getElementById("thisMonth").addEventListener("click", () => {
      state.currentMonth = toMonthValue(new Date());
      render();
    });
    document.getElementById("openSettings").addEventListener("click", openSettings);
    document.getElementById("clearMonth").addEventListener("click", clearCurrentMonth);
    document.getElementById("closeModal").addEventListener("click", closeModal);
    document.getElementById("cancelModal").addEventListener("click", closeModal);
    document.getElementById("closeSettings").addEventListener("click", closeSettings);
    document.getElementById("syncNow").addEventListener("click", () => {
      savePayments();
      showToast("同期を開始しました");
    });
    el.monthPicker.addEventListener("change", event => {
      state.currentMonth = event.target.value || toMonthValue(new Date());
      render();
    });
    el.paymentCategory.addEventListener("change", () => {
      if (!el.paymentId.value) {
        el.modalTitle.textContent = `${el.paymentCategory.value}を追加`;
      }
    });
    el.form.addEventListener("submit", handleSubmit);
    el.settingsForm.addEventListener("submit", event => {
      event.preventDefault();
      state.config.scriptUrl = el.scriptUrl.value.trim();
      state.config.token = el.syncToken.value.trim();
      saveConfig();
      closeSettings();
      render();
      loadFromSheet();
      showToast("設定を保存しました");
    });
    document.addEventListener("click", handlePageClick);
    document.addEventListener("change", handleSelection);
    el.modalBackdrop.addEventListener("click", event => {
      if (event.target === el.modalBackdrop) closeModal();
    });
    el.settingsBackdrop.addEventListener("click", event => {
      if (event.target === el.settingsBackdrop) closeSettings();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && el.modalBackdrop.classList.contains("open")) {
        closeModal();
      }
      if (event.key === "Escape" && el.settingsBackdrop.classList.contains("open")) {
        closeSettings();
      }
    });

    loadPayments();
    render();
    loadFromSheet();
  </script>
</body>
</html>
